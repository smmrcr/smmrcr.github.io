<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>57x57 Clean Sprite Sheet Generator</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #222; color: white; padding: 50px; }
        button { padding: 15px 30px; font-size: 1.2rem; cursor: pointer; background: #00ffcc; border: none; font-weight: bold;}
        canvas { display: none; /* Hide the massive canvas to prevent browser lag */ }
    </style>
</head>
<body>
    <h1>Precise 57x57 Clean Grid Template Generator</h1>
    <p>Generating a perfect 57x57 grid of distinct frames (now without numbers). This may take a moment!</p>
    <button id="downloadBtn">Download Clean Grid PNG</button>
    <canvas id="gridCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gridCanvas');
        const ctx = canvas.getContext('2d');
        
        // Define Grid Parameters (re-using practical frame size from before)
        const frameW = 160;   // Set a practical width for one frame (can be adjusted as needed)
        const frameH = 120;   // Set a practical height for one frame (can be adjusted as needed)
        const cols = 57;     // Your required number of columns
        const rows = 57;     // Your required number of rows
        
        // Set canvas dimensions to the total grid size
        canvas.width = cols * frameW;
        canvas.height = rows * frameH;

        // Loop through and draw all 3,249 frames
        for (let row = 0; row < rows; row++) {
            for (let col = 0; col < cols; col++) {
                let x = col * frameW;
                let y = row * frameH;
                
                // Generate a random, distinct color for this frame
                const r = Math.floor(Math.random() * 256);
                const g = Math.floor(Math.random() * 256);
                const b = Math.floor(Math.random() * 256);
                ctx.fillStyle = `rgb(${r},${g},${b})`;
                
                // Draw the colored block
                ctx.fillRect(x, y, frameW, frameH);
                
                // Optional: Draw subtle grid lines (keep these faint black borders for pattern distinction)
                ctx.strokeStyle = 'rgba(0,0,0,0.1)'; // VERY Faint black border
                ctx.lineWidth = 1;
                ctx.strokeRect(x, y, frameW, frameH);
                
                /* --- NUMBERS REMOVED ---
                const frameNumber = (row * cols) + col + 1;
                ctx.fillStyle = 'rgba(255,255,255,0.7)'; // White text for numbering (removed)
                ctx.font = `${frameH * 0.4}px monospace`; // Scale font to frame (removed)
                ctx.textAlign = 'center'; // (removed)
                ctx.textBaseline = 'middle'; // (removed)
                ctx.fillText(frameNumber, x + (frameW / 2), y + (frameH / 2)); // (removed)
                ------------------------- */
            }
        }

        // Handle Download as PNG
        document.getElementById('downloadBtn').addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = 'perfect_57x57_clean_grid.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        });
    </script>
</body>
</html>
