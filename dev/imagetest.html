<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Canal 3D Interface Base</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; } /* Sky blue background */
        canvas { display: block; }
        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-family: sans-serif;
            text-shadow: 1px 1px 2px black;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="ui-layer">
        <h1>Welcome to the Canal</h1>
        <p>Drag to look around. Scroll to zoom.</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        // 1. SCENE SETUP
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x87CEEB, 0.02); // Adds atmospheric depth

        // 2. CAMERA SETUP
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(2, 2, 5); // Positioned on the "path" looking forward

        // 3. RENDERER SETUP
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // 4. LIGHTING (Sunlight filtering through trees)
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xfffae3, 0.8);
        directionalLight.position.set(10, 20, 10);
        directionalLight.castShadow = true;
        scene.add(directionalLight);

        // 5. ENVIRONMENT STRUCTURE

        // A. The Dirt Path (Right side)
        const pathGeometry = new THREE.PlaneGeometry(5, 50);
        const pathMaterial = new THREE.MeshStandardMaterial({ color: 0x5c4033 }); // Brown dirt color
        const path = new THREE.Mesh(pathGeometry, pathMaterial);
        path.rotation.x = -Math.PI / 2;
        path.position.set(2.5, 0, -20);
        path.receiveShadow = true;
        scene.add(path);

        // B. The Canal Water (Left side)
        const waterGeometry = new THREE.PlaneGeometry(10, 50);
        const waterMaterial = new THREE.MeshStandardMaterial({ 
            color: 0x4a5d23, // Murky green/brown water reflection
            transparent: true,
            opacity: 0.8,
            roughness: 0.1,
            metalness: 0.8
        });
        const water = new THREE.Mesh(waterGeometry, waterMaterial);
        water.rotation.x = -Math.PI / 2;
        water.position.set(-5, -0.2, -20); // Slightly lower than the path
        scene.add(water);

        // C. Placeholder Trees (To be replaced by your .gltf models later)
        function createPlaceholderTree(x, z) {
            const trunkGeo = new THREE.CylinderGeometry(0.2, 0.3, 3);
            const trunkMat = new THREE.MeshStandardMaterial({ color: 0x3d2817 });
            const trunk = new THREE.Mesh(trunkGeo, trunkMat);
            trunk.position.set(x, 1.5, z);
            trunk.castShadow = true;

            const leavesGeo = new THREE.SphereGeometry(1.5);
            const leavesMat = new THREE.MeshStandardMaterial({ color: 0x228b22 });
            const leaves = new THREE.Mesh(leavesGeo, leavesMat);
            leaves.position.set(x, 3.5, z);
            leaves.castShadow = true;

            scene.add(trunk);
            scene.add(leaves);
        }

        // Add some trees along the path and water bank
        createPlaceholderTree(4, -5);
        createPlaceholderTree(4.5, -15);
        createPlaceholderTree(-1, -10);
        createPlaceholderTree(-2, -25);

        // 6. CONTROLS (Allows user to look around)
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 1, -10); // Look down the canal
        controls.update();

        // 7. ANIMATION LOOP
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();

        // Handle window resizing
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
