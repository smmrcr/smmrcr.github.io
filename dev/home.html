<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Household Dashboard</title>
  
  <!-- Tailwind CSS for styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    /* Custom utility classes and animations */
    body { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    
    .glass-card {
      background-color: rgba(255, 255, 255, 0.4);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
    }
    
    .glass-input {
      background-color: rgba(255, 255, 255, 0.4);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 255, 255, 0.5);
    }
    .glass-input:focus {
      background-color: rgba(255, 255, 255, 0.6);
      outline: none;
      box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.8);
    }

    /* Custom scrollbar for webkit */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(148, 163, 184, 0.3); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(148, 163, 184, 0.5); }
    
    .animate-spin-slow { animation: spin 2s linear infinite; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 overflow-hidden">

  <div class="relative flex flex-col md:flex-row h-screen overflow-hidden">
    
    <!-- Liquid Glass Background Orbs -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none -z-10 bg-slate-50">
      <div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] rounded-full bg-indigo-300/40 blur-[100px] mix-blend-multiply animate-pulse" style="animation-duration: 8s;"></div>
      <div class="absolute top-[20%] right-[-10%] w-[40%] h-[50%] rounded-full bg-teal-300/40 blur-[100px] mix-blend-multiply animate-pulse" style="animation-duration: 12s;"></div>
      <div class="absolute bottom-[-10%] left-[20%] w-[60%] h-[50%] rounded-full bg-purple-300/40 blur-[100px] mix-blend-multiply animate-pulse" style="animation-duration: 10s;"></div>
    </div>
    
    <!-- Notification Container -->
    <div id="notification-container" class="fixed top-4 right-4 z-50 hidden opacity-0 transition-opacity duration-300 px-5 py-4 rounded-2xl shadow-xl border glass-card flex items-center gap-3">
      <i data-lucide="alert-circle" class="w-5 h-5" id="notif-icon"></i>
      <span id="notification-msg" class="font-bold"></span>
    </div>

    <!-- Sidebar - Glassmorphism -->
    <nav class="bg-white/30 backdrop-blur-xl border-r border-white/50 w-full md:w-64 flex-shrink-0 flex flex-row md:flex-col order-last md:order-first z-10 border-t md:border-t-0 shadow-[4px_0_24px_rgba(0,0,0,0.02)]">
      <div class="p-6 hidden md:block">
        <h1 class="text-2xl font-black bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-teal-500 drop-shadow-sm">
          Household DB
        </h1>
        <div class="flex items-center gap-2 mt-2">
          <span class="relative flex h-2.5 w-2.5">
            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
            <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-emerald-500"></span>
          </span>
          <p class="text-xs font-bold text-slate-500 uppercase tracking-wider">Local Auto-Save</p>
        </div>
      </div>
      <div id="nav-container" class="flex-1 flex flex-row md:flex-col overflow-x-auto md:overflow-visible px-2 md:px-4 py-2 md:py-0 gap-2 md:gap-3">
        <!-- Nav buttons injected via JS -->
      </div>
    </nav>

    <!-- Main Content Area -->
    <main class="flex-1 overflow-y-auto p-4 md:p-8 relative z-0">
      <div id="main-content" class="max-w-5xl mx-auto pb-20 md:pb-0">
        <!-- Dynamic Content loads here -->
      </div>
    </main>
    
  </div>

  <script>
    // --- Configuration & Utilities ---
    const apiKey = ""; // Execution environment provides the key at runtime
    const generateId = () => Math.random().toString(36).substr(2, 9);
    const getToday = () => new Date().toISOString().split('T')[0];

    const fetchGeminiWithRetry = async (url, payload, retries = 5) => {
      const delays = [1000, 2000, 4000, 8000, 16000];
      for (let i = 0; i < retries; i++) {
        try {
          const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
          return await response.json();
        } catch (err) {
          if (i === retries - 1) throw err;
          await new Promise(resolve => setTimeout(resolve, delays[i]));
        }
      }
    };

    // --- State Management ---
    const initialData = { maintenance: [], finances: [], lists: [], invoices: [], inventory: [] };
    
    const App = {
      activeTab: 'dashboard',
      data: initialData,
      isAiLoading: {}, // Track AI states
      
      init() {
        this.loadData();
        this.renderNav();
        this.renderContent();
      },

      loadData() {
        try {
          const saved = localStorage.getItem('householdData_v3') || localStorage.getItem('householdData_v2') || localStorage.getItem('householdData');
          if (saved) {
            let parsed = JSON.parse(saved);
            // Migrations
            if (parsed.bills && !parsed.finances) {
              parsed.finances = parsed.bills.map(b => ({ id: b.id, type: 'expense', date: b.date, description: b.payee, amount: b.amount, category: b.category, vat: 0, isTaxDeductible: false }));
              delete parsed.bills;
            }
            if (!parsed.inventory) parsed.inventory = [];
            if (!parsed.finances) parsed.finances = [];
            if (!parsed.lists) parsed.lists = [];
            if (!parsed.maintenance) parsed.maintenance = [];
            if (!parsed.invoices) parsed.invoices = [];
            this.data = parsed;
          }
        } catch(e) { console.error("Error loading saved data", e); }
      },

      saveData() {
        localStorage.setItem('householdData_v3', JSON.stringify(this.data));
        this.renderContent(); // Re-render to reflect changes
      },

      setTab(tabId) {
        this.activeTab = tabId;
        this.renderNav();
        this.renderContent();
      },

      showNotification(msg, type = 'info') {
        const notif = document.getElementById('notification-container');
        const msgEl = document.getElementById('notification-msg');
        const iconEl = document.getElementById('notif-icon');
        
        msgEl.innerText = msg;
        notif.className = `fixed top-4 right-4 z-50 transition-opacity duration-300 px-5 py-4 rounded-2xl shadow-xl border glass-card flex items-center gap-3 animate-in slide-in-from-top-4 ${
          type === 'error' ? 'bg-red-500/20 text-red-900 border-red-500/30' : 'bg-emerald-500/20 text-emerald-900 border-emerald-500/30'
        }`;
        
        notif.classList.remove('hidden', 'opacity-0');
        
        setTimeout(() => {
          notif.classList.add('opacity-0');
          setTimeout(() => notif.classList.add('hidden'), 300);
        }, 4000);
      },

      // --- Rendering Logic ---
      renderNav() {
        const navItems = [
          { id: 'dashboard', label: 'Dashboard', icon: 'home' },
          { id: 'maintenance', label: 'Maintenance', icon: 'wrench' },
          { id: 'finances', label: 'Finances', icon: 'wallet' },
          { id: 'inventory', label: 'Assets & Vehicles', icon: 'package' },
          { id: 'lists', label: 'Lists', icon: 'list-todo' },
          { id: 'archive', label: 'Archive/Backup', icon: 'archive' },
        ];

        const container = document.getElementById('nav-container');
        container.innerHTML = navItems.map(item => {
          const isActive = this.activeTab === item.id;
          return `
            <button
              onclick="App.setTab('${item.id}')"
              class="flex flex-col md:flex-row items-center gap-1 md:gap-3 px-4 py-3.5 rounded-2xl font-bold transition-all flex-shrink-0
                ${isActive ? 'bg-white/60 text-indigo-700 shadow-sm border border-white/60 backdrop-blur-md' : 'text-slate-600 hover:bg-white/40 hover:text-indigo-600 border border-transparent'}"
            >
              <i data-lucide="${item.icon}" class="${isActive ? 'text-indigo-600' : 'text-slate-400/80'} w-[22px] h-[22px]"></i>
              <span class="text-xs md:text-sm">${item.label}</span>
              ${isActive ? '<i data-lucide="chevron-right" class="hidden md:block ml-auto text-indigo-400 w-[18px] h-[18px]"></i>' : ''}
            </button>
          `;
        }).join('');
        lucide.createIcons();
      },

      renderContent() {
        const content = document.getElementById('main-content');
        
        switch(this.activeTab) {
          case 'dashboard': content.innerHTML = this.views.dashboard(); break;
          case 'maintenance': content.innerHTML = this.views.maintenance(); break;
          case 'finances': content.innerHTML = this.views.finances(); break;
          case 'inventory': content.innerHTML = this.views.inventory(); break;
          case 'lists': content.innerHTML = this.views.lists(); break;
          case 'archive': content.innerHTML = this.views.archive(); break;
        }
        
        // Re-initialize icons for newly injected HTML
        lucide.createIcons();
        
        // Attach dynamic listeners if needed for specific tabs
        if(this.activeTab === 'finances') this.setupFinancesListeners();
      },

      // --- SVG Chart Generator ---
      generateChart(dataArray, title) {
        if (!dataArray || dataArray.length === 0) return `<div class="text-slate-500 text-center py-10 font-medium">No data available</div>`;

        const maxVal = Math.max(...dataArray.map(d => d.value), 10);
        const chartHeight = 200;
        const chartWidth = 500;
        const padding = 40;

        let yAxisHtml = [0, 0.5, 1].map(ratio => {
          const y = chartHeight - (chartHeight * ratio);
          return `
            <g>
              <line x1="0" y1="${y}" x2="${chartWidth}" y2="${y}" stroke="rgba(255,255,255,0.5)" stroke-dasharray="4 4" />
              <text x="0" y="${y - 5}" fill="#64748b" font-size="12" font-weight="600">£${(maxVal * ratio).toFixed(0)}</text>
            </g>`;
        }).join('');

        let barsHtml = dataArray.map((item, i) => {
          const barWidth = (chartWidth / dataArray.length) * 0.6;
          const spacing = (chartWidth / dataArray.length);
          const barHeight = (item.value / maxVal) * chartHeight;
          const x = (i * spacing) + (spacing - barWidth) / 2;
          const y = chartHeight - barHeight;

          return `
            <g>
              <rect x="${x}" y="${y}" width="${barWidth}" height="${barHeight}" fill="rgba(59, 130, 246, 0.6)" rx="6" ry="6" class="hover:fill-blue-500 transition-colors cursor-pointer">
                <title>${item.label}: £${item.value.toFixed(2)}</title>
              </rect>
              <text x="${x + barWidth/2}" y="${chartHeight + 20}" text-anchor="middle" fill="#475569" font-size="12" font-weight="600">
                ${item.label}
              </text>
            </g>`;
        }).join('');

        return `
          <div class="w-full overflow-x-auto">
            <h3 class="text-lg font-bold text-slate-800 mb-4">${title}</h3>
            <svg viewBox="0 0 ${chartWidth} ${chartHeight + padding}" class="w-full h-48 min-w-[400px]">
              ${yAxisHtml}
              ${barsHtml}
            </svg>
          </div>
        `;
      },

      // --- View Templates ---
      views: {
        dashboard: () => {
          const pendingMaintenance = App.data.maintenance.filter(m => m.status === 'pending').length;
          const currentMonth = new Date().toISOString().slice(0, 7);
          
          const monthlyExpenses = App.data.finances.filter(f => f.type === 'expense' && f.date.startsWith(currentMonth));
          const monthlyExpenseTotal = monthlyExpenses.reduce((sum, f) => sum + (parseFloat(f.amount) || 0), 0);

          const months = {};
          App.data.finances.filter(f => f.type === 'expense').forEach(b => {
            const month = b.date.slice(0, 7); 
            months[month] = (months[month] || 0) + (parseFloat(b.amount) || 0);
          });
          const chartData = Object.entries(months).sort((a, b) => a[0].localeCompare(b[0])).slice(-6).map(([label, value]) => ({ label, value }));

          const upcomingEvents = [
            ...App.data.maintenance.filter(m => m.status === 'pending').map(m => ({ id: m.id, title: m.task, date: m.dueDate, type: 'Maintenance' })),
            ...(App.data.inventory || []).filter(i => i.expiryDate).map(i => ({ 
              id: i.id, title: `${i.name} (${i.category === 'Vehicle' ? 'MOT/Insurance' : 'Warranty'})`, date: i.expiryDate, type: 'Inventory' 
            }))
          ].sort((a, b) => new Date(a.date) - new Date(b.date)).slice(0, 6);

          return `
            <div class="space-y-6 animate-in fade-in duration-300">
              <h2 class="text-3xl font-black text-slate-800 drop-shadow-sm">Home Summary</h2>
              
              <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div class="glass-card bg-gradient-to-br from-blue-400/40 to-blue-600/40 border-white/40 rounded-3xl p-6">
                  <h3 class="text-blue-900 font-bold mb-1">Expenses This Month</h3>
                  <p class="text-4xl font-black text-slate-900">£${monthlyExpenseTotal.toFixed(2)}</p>
                  <p class="text-sm text-blue-800 font-medium mt-2">${monthlyExpenses.length} transactions recorded</p>
                </div>
                <div class="glass-card bg-gradient-to-br from-amber-400/40 to-amber-600/40 border-white/40 rounded-3xl p-6">
                  <h3 class="text-amber-900 font-bold mb-1">Pending Maintenance</h3>
                  <p class="text-4xl font-black text-slate-900">${pendingMaintenance}</p>
                  <p class="text-sm text-amber-800 font-medium mt-2">Tasks require your attention</p>
                </div>
                <div class="glass-card bg-gradient-to-br from-emerald-400/40 to-emerald-600/40 border-white/40 rounded-3xl p-6">
                  <h3 class="text-emerald-900 font-bold mb-1">Total Tracked Assets</h3>
                  <p class="text-4xl font-black text-slate-900">${App.data.inventory.length}</p>
                  <p class="text-sm text-emerald-800 font-medium mt-2">Vehicles and Valuables</p>
                </div>
              </div>
              
              <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-2 glass-card rounded-3xl p-6 h-full">
                  ${App.generateChart(chartData, "Recent Expense History")}
                </div>
                
                <div class="glass-card rounded-3xl p-6 flex flex-col">
                  <h3 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2">
                    <i data-lucide="bell" class="text-indigo-600 w-5 h-5"></i> Upcoming Deadlines
                  </h3>
                  <div class="flex-1 overflow-y-auto pr-2 space-y-3">
                    ${upcomingEvents.length === 0 ? '<p class="text-sm text-slate-500 font-medium italic">No upcoming deadlines.</p>' : ''}
                    ${upcomingEvents.map(event => {
                      const isOverdue = new Date(event.date) < new Date(getToday());
                      return `
                        <div class="p-3 rounded-xl border ${isOverdue ? 'bg-red-500/10 border-red-500/20' : 'bg-white/30 border-white/50 backdrop-blur-md'}">
                          <div class="flex justify-between items-start gap-2">
                            <p class="text-sm font-bold leading-tight ${isOverdue ? 'text-red-900' : 'text-slate-800'}">${event.title}</p>
                            <span class="text-[10px] uppercase tracking-wide font-bold px-2 py-0.5 rounded-full ${event.type === 'Maintenance' ? 'bg-amber-400/30 text-amber-900' : 'bg-indigo-400/30 text-indigo-900'}">
                              ${event.type}
                            </span>
                          </div>
                          <p class="text-xs mt-1 font-medium ${isOverdue ? 'text-red-700' : 'text-slate-600'}">
                            ${isOverdue ? 'Overdue: ' : 'Due: '} ${new Date(event.date).toLocaleDateString()}
                          </p>
                        </div>
                      `;
                    }).join('')}
                  </div>
                </div>
              </div>
            </div>
          `;
        },

        maintenance: () => {
          return `
            <div class="space-y-6 animate-in fade-in">
              <h2 class="text-3xl font-black text-slate-800 drop-shadow-sm">Property Maintenance</h2>
              
              <div class="glass-card rounded-3xl p-6">
                <form onsubmit="App.actions.addMaintenance(event)" class="flex flex-col md:flex-row gap-4 items-end">
                  <div class="flex-1 w-full">
                    <label class="block text-sm font-bold text-slate-700 mb-1 ml-1">Task Description</label>
                    <input id="mtask" type="text" required class="glass-input w-full p-2.5 rounded-xl text-slate-800" placeholder="e.g., Boiler service" />
                  </div>
                  <div class="w-full md:w-48">
                    <label class="block text-sm font-bold text-slate-700 mb-1 ml-1">Due Date</label>
                    <input id="mdate" type="date" required value="${getToday()}" class="glass-input w-full p-2.5 rounded-xl text-slate-800" />
                  </div>
                  <button type="submit" class="bg-white/50 hover:bg-white/80 text-slate-800 border border-white/60 shadow-sm backdrop-blur-md flex items-center justify-center gap-2 px-4 py-2.5 rounded-xl font-semibold transition-all w-full md:w-auto h-[46px]">
                    <i data-lucide="plus" class="w-[18px] h-[18px]"></i> Add Task
                  </button>
                </form>
              </div>

              <div class="glass-card rounded-3xl p-0 overflow-hidden">
                ${App.data.maintenance.length === 0 ? '<div class="p-8 text-center text-slate-600 font-medium">No maintenance tasks scheduled.</div>' : `
                  <ul class="divide-y divide-white/40">
                    ${App.data.maintenance.sort((a,b) => new Date(a.dueDate) - new Date(b.dueDate)).map(item => `
                      <li class="p-5 flex flex-col md:flex-row items-start md:items-center justify-between hover:bg-white/20 transition-colors gap-4">
                        <div class="flex items-center gap-4">
                          <button onclick="App.actions.toggleMaintenance('${item.id}')" class="text-blue-600 hover:text-blue-800 shrink-0 transition-transform hover:scale-110">
                            ${item.status === 'completed' ? '<i data-lucide="check-circle-2" class="text-emerald-500 w-[26px] h-[26px]"></i>' : '<i data-lucide="circle" class="text-slate-400/70 w-[26px] h-[26px]"></i>'}
                          </button>
                          <div>
                            <p class="font-bold text-lg ${item.status === 'completed' ? 'line-through text-slate-400' : 'text-slate-800'}">
                              ${item.task}
                            </p>
                            <p class="text-sm font-medium text-slate-500">Due: ${new Date(item.dueDate).toLocaleDateString()}</p>
                          </div>
                        </div>
                        
                        <div class="flex items-center gap-3 w-full md:w-auto pl-10 md:pl-0">
                          <button 
                            id="ai-btn-${item.id}"
                            onclick="App.actions.aiBreakdown('${item.id}', '${item.task}')" 
                            class="bg-gradient-to-r from-indigo-500/80 to-purple-500/80 hover:from-indigo-500 hover:to-purple-500 text-white shadow-lg shadow-purple-500/20 backdrop-blur-md border border-white/20 flex items-center justify-center gap-2 px-3 py-1.5 rounded-xl font-semibold transition-all text-xs flex-1 md:flex-none">
                            <i data-lucide="sparkles" class="w-[14px] h-[14px] ai-icon"></i> <span class="ai-text">Step-by-Step</span>
                          </button>
                          <button onclick="App.actions.deleteMaintenance('${item.id}')" class="p-2.5 text-slate-400/80 hover:text-red-500 bg-white/30 hover:bg-red-500/10 rounded-xl transition-all">
                            <i data-lucide="trash-2" class="w-[18px] h-[18px]"></i>
                          </button>
                        </div>
                      </li>
                    `).join('')}
                  </ul>
                `}
              </div>
            </div>
          `;
        },

        finances: () => {
          return `
            <div class="space-y-6 animate-in fade-in">
              <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                <h2 class="text-3xl font-black text-slate-800 drop-shadow-sm">Finances & Taxes</h2>
                <div class="flex gap-3">
                  <button onclick="App.actions.exportCSV()" class="bg-emerald-500/80 hover:bg-emerald-500 text-white shadow-lg shadow-emerald-500/20 backdrop-blur-md border border-white/20 flex items-center justify-center gap-2 px-4 py-2 rounded-xl font-semibold transition-all">
                    <i data-lucide="file-spreadsheet" class="w-[18px] h-[18px]"></i> Export CSV
                  </button>
                  <button id="ai-spend-btn" onclick="App.actions.aiAnalyzeSpending()" class="bg-gradient-to-r from-indigo-500/80 to-purple-500/80 hover:from-indigo-500 hover:to-purple-500 text-white shadow-lg shadow-purple-500/20 backdrop-blur-md border border-white/20 flex items-center justify-center gap-2 px-4 py-2 rounded-xl font-semibold transition-all">
                    <i data-lucide="sparkles" class="w-[18px] h-[18px] ai-icon"></i> <span class="ai-text">AI Insights</span>
                  </button>
                </div>
              </div>

              <div id="ai-analysis-container" class="hidden glass-card bg-indigo-400/20 border-indigo-300/50 rounded-3xl p-6 relative animate-in slide-in-from-top-4">
                <button onclick="document.getElementById('ai-analysis-container').classList.add('hidden')" class="absolute top-4 right-4 text-indigo-700/60 hover:text-indigo-800"><i data-lucide="x" class="w-5 h-5"></i></button>
                <div class="flex gap-4">
                  <div class="p-3 bg-indigo-500/20 rounded-2xl shrink-0 h-fit"><i data-lucide="sparkles" class="text-indigo-700 w-6 h-6"></i></div>
                  <div>
                    <h4 class="font-bold text-indigo-900 text-lg mb-1">AI Financial Analysis</h4>
                    <p id="ai-analysis-text" class="text-indigo-900/80 font-medium leading-relaxed whitespace-pre-wrap"></p>
                  </div>
                </div>
              </div>
              
              <div class="glass-card rounded-3xl p-6">
                <div class="mb-6 pb-6 border-b border-white/40 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                  <div class="flex items-center gap-3">
                    <h3 class="font-bold text-slate-800 text-lg">Record Transaction</h3>
                    <select id="fin-type" class="glass-input w-auto p-2.5 rounded-xl font-semibold shadow-sm">
                      <option value="expense">Expense / Bill</option>
                      <option value="payslip">Salary Payslip</option>
                      <option value="income">Other Income</option>
                      <option value="charity">Charity Donation</option>
                    </select>
                  </div>
                  <div id="receipt-scan-container">
                    <input type="file" accept="image/*" capture="environment" class="hidden" id="fin-file" onchange="App.actions.scanReceipt(event)" />
                    <button id="ai-receipt-btn" onclick="document.getElementById('fin-file').click()" class="bg-gradient-to-r from-indigo-500/80 to-purple-500/80 hover:from-indigo-500 hover:to-purple-500 text-white shadow-md backdrop-blur-md border border-white/20 flex items-center justify-center gap-2 px-3 py-1.5 rounded-xl font-semibold transition-all text-sm">
                      <i data-lucide="camera" class="w-[16px] h-[16px] ai-icon"></i> <span class="ai-text">Scan Receipt</span>
                    </button>
                  </div>
                </div>

                <form onsubmit="App.actions.addFinance(event)" class="space-y-5">
                  <div class="grid grid-cols-1 md:grid-cols-4 gap-5" id="fin-form-fields">

          const task = document.getElementById('mtask').value;
          const dueDate = document.getElementById('mdate').value;
          App.data.maintenance.push({ id: generateId(), task, dueDate, status: 'pending' });
          App.saveData();
        },
        toggleMaintenance: (id) => {
          const item = App.data.maintenance.find(m => m.id === id);
          if (item) item.status = item.status === 'pending' ? 'completed' : 'pending';
          App.saveData();
        },
        deleteMaintenance: (id) => {
          App.data.maintenance = App.data.maintenance.filter(m => m.id !== id);
          App.saveData();
        },
        aiBreakdown: async (id, task) => {
          const btn = document.getElementById(`ai-btn-${id}`);
          const icon = btn.querySelector('.ai-icon');
          const text = btn.querySelector('.ai-text');
          
          btn.disabled = true;
          icon.setAttribute('data-lucide', 'loader-2');
          icon.classList.add('animate-spin-slow');
          text.innerText = 'Thinking...';
          lucide.createIcons();

          try {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const payload = {
              contents: [{ parts: [{ text: `Break down the household maintenance task "${task}" into 3 to 6 logical, actionable steps for a homeowner. Return ONLY a JSON object with a single key "steps" containing an array of strings.` }] }],
              systemInstruction: { parts: [{ text: "You are an expert home maintenance assistant." }] },
              generationConfig: { responseMimeType: "application/json" }
            };
            const result = await fetchGeminiWithRetry(url, payload);
            const textResponse = result.candidates?.[0]?.content?.parts?.[0]?.text;
            if (textResponse) {
              const parsed = JSON.parse(textResponse);
              if (parsed.steps && Array.isArray(parsed.steps)) {
                const newList = { id: generateId(), title: `Guide: ${task}`, items: parsed.steps.map(step => ({ id: generateId(), text: step, done: false })) };
                App.data.lists.push(newList);
                App.saveData();
                App.showNotification(`Checklist for "${task}" created in Lists!`, 'success');
              }
            }
          } catch (err) { App.showNotification("Failed to generate AI checklist.", "error"); }
          finally { 
            // Button state will reset on re-render, but good to handle in case re-render didn't happen
            if(document.getElementById(`ai-btn-${id}`)) App.renderContent(); 
          }
        },

        // Finances
        addFinance: (e) => {
          e.preventDefault();
          const type = document.getElementById('fin-type').value;
          const date = document.getElementById('fin-date').value;
          const description = document.getElementById('fin-desc').value;
          let tx = { id: generateId(), type, date, description };

          if (type === 'expense') {
            tx.amount = parseFloat(document.getElementById('fin-amount').value);
            tx.vat = parseFloat(document.getElementById('fin-vat').value) || 0;
            tx.category = document.getElementById('fin-cat').value;
            tx.isTaxDeductible = document.getElementById('fin-deduct').checked;
          } else if (type === 'payslip') {
            tx.gross = parseFloat(document.getElementById('fin-gross').value) || 0;
            tx.tax = parseFloat(document.getElementById('fin-tax').value) || 0;
            tx.ni = parseFloat(document.getElementById('fin-ni').value) || 0;
            tx.pension = parseFloat(document.getElementById('fin-pen').value) || 0;
            tx.net = tx.gross - tx.tax - tx.ni - tx.pension;
            tx.category = 'Salary';
          } else if (type === 'charity') {
            tx.amount = parseFloat(document.getElementById('fin-amount').value);
            tx.giftAid = document.getElementById('fin-giftaid').checked;
            tx.category = 'Charity';
          } else if (type === 'income') {
            tx.amount = parseFloat(document.getElementById('fin-amount').value);
            tx.tax = parseFloat(document.getElementById('fin-tax').value) || 0;
            tx.category = document.getElementById('fin-cat').value;
          }

          App.data.finances.push(tx);
          App.saveData();
        },
        deleteFinance: (id) => {
          App.data.finances = App.data.finances.filter(f => f.id !== id);
          App.saveData();
        },
        exportCSV: () => {
          const headers = ["Date", "Type", "Description/Payee", "Category", "Gross/Total Amount (£)", "Tax/VAT (£)", "NI (£)", "Pension (£)", "Net Amount (£)", "Notes"];
          const rows = App.data.finances.map(f => {
            if(f.type === 'payslip') return [f.date, f.type, `"${f.description}"`, f.category, f.gross, f.tax, f.ni, f.pension, f.net, ''];
            if(f.type === 'expense') return [f.date, f.type, `"${f.description}"`, f.category, f.amount, f.vat || 0, '', '', '', f.isTaxDeductible ? 'Tax Deductible' : ''];
            if(f.type === 'charity') return [f.date, f.type, `"${f.description}"`, 'Charity', f.amount, '', '', '', '', f.giftAid ? 'Gift Aid' : ''];
            if(f.type === 'income') return [f.date, f.type, `"${f.description}"`, f.category || 'Income', f.amount, f.tax || 0, '', '', '', ''];
            return [f.date, 'unknown', `"${f.description}"`, '', '', '', '', '', '', ''];
          });
          const csvContent = [headers.join(","), ...rows.map(e => e.join(","))].join("\n");
          const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
          const link = document.createElement("a"); link.href = URL.createObjectURL(blob); 
          link.setAttribute("download", `UK_Finances_Export_${getToday()}.csv`);
          document.body.appendChild(link); link.click(); document.body.removeChild(link);
          App.showNotification("CSV Exported successfully!", "success");
        },
        scanReceipt: (e) => {
          const file = e.target.files[0];
          if (!file) return;
          const btn = document.getElementById('ai-receipt-btn');
          const icon = btn.querySelector('.ai-icon');
          const text = btn.querySelector('.ai-text');
          
          btn.disabled = true; icon.setAttribute('data-lucide', 'loader-2'); icon.classList.add('animate-spin-slow'); text.innerText = 'Scanning...'; lucide.createIcons();

          const reader = new FileReader();
          reader.onload = async (event) => {
            try {
              const img = new Image();
              img.onload = async () => {
                const canvas = document.createElement('canvas'); const MAX_WIDTH = 800;
                let width = img.width; let height = img.height;
                if (width > MAX_WIDTH) { height = Math.round((height * MAX_WIDTH) / width); width = MAX_WIDTH; }
                canvas.width = width; canvas.height = height; canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                const base64Data = canvas.toDataURL('image/jpeg', 0.7).split(',')[1];
                
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                const payload = {
                  contents: [{ role: "user", parts: [
                      { text: "Analyze this UK receipt/invoice. Return a JSON object with: 'description' (string, the store/company name), 'amount' (number, total cost including VAT), 'vat' (number, VAT amount if visible, otherwise 0), 'date' (string, YYYY-MM-DD format if visible), 'category' (string, choose best fit: Utilities, Services, Groceries, Maintenance, Office, Other)." },
                      { inlineData: { mimeType: "image/jpeg", data: base64Data } }
                  ]}], generationConfig: { responseMimeType: "application/json" }
                };
                const result = await fetchGeminiWithRetry(url, payload);
                const textResponse = result.candidates?.[0]?.content?.parts?.[0]?.text;
                if (textResponse) {
                  const parsed = JSON.parse(textResponse);
                  document.getElementById('fin-desc').value = parsed.description || '';
                  if(document.getElementById('fin-amount')) document.getElementById('fin-amount').value = parsed.amount || '';
                  if(document.getElementById('fin-vat')) document.getElementById('fin-vat').value = parsed.vat || '';
                  if(document.getElementById('fin-date')) document.getElementById('fin-date').value = parsed.date || getToday();
                  if(document.getElementById('fin-cat') && parsed.category) document.getElementById('fin-cat').value = parsed.category;
                  App.showNotification("Receipt scanned! Please review the details.", "success");
                }
              }; img.src = event.target.result;
            } catch (err) { App.showNotification("Failed to analyze receipt.", "error"); }
            finally { App.renderContent(); } // Resets button state
          }; reader.readAsDataURL(file);
        },
        aiAnalyzeSpending: async () => {
          if (App.data.finances.length === 0) return App.showNotification("No financial data to analyze.", "error");
          const btn = document.getElementById('ai-spend-btn');
          const icon = btn.querySelector('.ai-icon');
          const text = btn.querySelector('.ai-text');
          
          btn.disabled = true; icon.setAttribute('data-lucide', 'loader-2'); icon.classList.add('animate-spin-slow'); text.innerText = 'Analyzing...'; lucide.createIcons();
          
          try {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const payload = {
              contents: [{ parts: [{ text: `Analyze this UK household financial data: ${JSON.stringify(App.data.finances)}. Give a brief 2-sentence summary of the cash flow (income vs expenses) and 1 actionable UK-specific financial tip.` }] }],
              systemInstruction: { parts: [{ text: "You are a helpful, brief UK financial assistant." }] }
            };
            const result = await fetchGeminiWithRetry(url, payload);
            const textResponse = result.candidates?.[0]?.content?.parts?.[0]?.text;
            if (textResponse) {
              const cont = document.getElementById('ai-analysis-container');
              document.getElementById('ai-analysis-text').innerText = textResponse;
              cont.classList.remove('hidden');
            }
          } catch (err) { App.showNotification("Failed to analyze finances.", "error"); }
          finally { btn.disabled = false; icon.setAttribute('data-lucide', 'sparkles'); icon.classList.remove('animate-spin-slow'); text.innerText = 'AI Insights'; lucide.createIcons(); }
        },

        // Inventory
        addInventory: (e) => {
          e.preventDefault();
          const name = document.getElementById('inv-name').value;
          const category = document.getElementById('inv-cat').value;
          const value = parseFloat(document.getElementById('inv-val').value) || 0;
          const purchaseDate = document.getElementById('inv-pdate').value;
          const expiryDate = document.getElementById('inv-edate').value;
          const notes = document.getElementById('inv-notes').value;
          
          App.data.inventory.push({ id: generateId(), name, category, value, purchaseDate, expiryDate, notes });
          App.saveData();
        },
        deleteInventory: (id) => {
          App.data.inventory = App.data.inventory.filter(i => i.id !== id);
          App.saveData();
        },
        scanInventory: (e) => {
          const file = e.target.files[0];
          if (!file) return;
          const btn = document.getElementById('ai-inv-btn');
          const icon = btn.querySelector('.ai-icon');
          const text = btn.querySelector('.ai-text');
          
          btn.disabled = true; icon.setAttribute('data-lucide', 'loader-2'); icon.classList.add('animate-spin-slow'); text.innerText = 'Scanning...'; lucide.createIcons();

          const reader = new FileReader();
          reader.onload = async (event) => {
            try {
              const img = new Image();
              img.onload = async () => {
                const canvas = document.createElement('canvas'); const MAX_WIDTH = 800;
                let width = img.width; let height = img.height;
                if (width > MAX_WIDTH) { height = Math.round((height * MAX_WIDTH) / width); width = MAX_WIDTH; }
                canvas.width = width; canvas.height = height; canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                const base64Data = canvas.toDataURL('image/jpeg', 0.7).split(',')[1];
                
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                const payload = {
                  contents: [{ role: "user", parts: [
                      { text: "Analyze this document/receipt/product label. Return a JSON object with: 'name' (string, the product or vehicle name), 'value' (number, price if visible), 'purchaseDate' (string, YYYY-MM-DD if visible), 'expiryDate' (string, YYYY-MM-DD representing warranty end, MOT due date, or insurance expiry), 'category' (string, choose best fit: Vehicle, Appliance, Electronics, Valuable, Other)." },
                      { inlineData: { mimeType: "image/jpeg", data: base64Data } }
                  ]}], generationConfig: { responseMimeType: "application/json" }
                };
                const result = await fetchGeminiWithRetry(url, payload);
                const textResponse = result.candidates?.[0]?.content?.parts?.[0]?.text;
                if (textResponse) {
                  const parsed = JSON.parse(textResponse);
                  document.getElementById('inv-name').value = parsed.name || '';
                  document.getElementById('inv-val').value = parsed.value || '';
                  document.getElementById('inv-pdate').value = parsed.purchaseDate || getToday();
                  document.getElementById('inv-edate').value = parsed.expiryDate || '';
                  if(parsed.category) document.getElementById('inv-cat').value = parsed.category;
                  App.showNotification("Document scanned! Please review details.", "success");
                }
              }; img.src = event.target.result;
            } catch (err) { App.showNotification("Failed to analyze image.", "error"); }
            finally { App.renderContent(); }
          }; reader.readAsDataURL(file);
        },

        // Lists
        addList: () => {
          const input = document.getElementById('newListTitle');
          if(!input.value.trim()) return;
          App.data.lists.push({ id: generateId(), title: input.value, items: [] });
          App.saveData();
        },
        deleteList: (id) => {
          App.data.lists = App.data.lists.filter(l => l.id !== id);
          App.saveData();
        },
        addListItem: (listId) => {
          const input = document.getElementById(`list-item-new-${listId}`);
          if(!input.value.trim()) return;
          const list = App.data.lists.find(l => l.id === listId);
          if (list) list.items.push({ id: generateId(), text: input.value, done: false });
          App.saveData();
        },
        toggleListItem: (listId, itemId) => {
          const list = App.data.lists.find(l => l.id === listId);
          const item = list?.items.find(i => i.id === itemId);
          if (item) item.done = !item.done;
          App.saveData();
        },
        deleteListItem: (listId, itemId) => {
          const list = App.data.lists.find(l => l.id === listId);
          if(list) list.items = list.items.filter(i => i.id !== itemId);
          App.saveData();
        },

        // Archive
        exportJson: () => {
          const dataStr = JSON.stringify(App.data, null, 2);
          const blob = new Blob([dataStr], { type: "application/json" });
          const url = URL.createObjectURL(blob);
          const link = document.createElement("a"); link.href = url; link.download = `household_backup_${getToday()}.json`;
          document.body.appendChild(link); link.click(); document.body.removeChild(link);
          App.showNotification("Archive downloaded successfully!", "success");
        },
        importJson: (e) => {
          const file = e.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = (event) => {
            try {
              const importedData = JSON.parse(event.target.result);
              if (importedData.bills && !importedData.finances) {
                 importedData.finances = importedData.bills.map(b => ({ id: b.id, type: 'expense', date: b.date, description: b.payee, amount: b.amount, category: b.category, vat: 0, isTaxDeductible: false }));
                 delete importedData.bills;
              }
              if (!importedData.inventory) importedData.inventory = [];
              if (importedData.maintenance && importedData.finances) {
                App.data = importedData;
                App.saveData();
                App.showNotification("Archive loaded successfully!", "success");
              } else App.showNotification("Invalid archive format.", "error");
            } catch (err) { App.showNotification("Failed to parse file.", "error"); }
          };
          reader.readAsText(file); e.target.value = null;
        },
        uploadImage: (e) => {
          const file = e.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
              const canvas = document.createElement('canvas'); const MAX_WIDTH = 800;
              let width = img.width; let height = img.height;
              if (width > MAX_WIDTH) { height = Math.round((height * MAX_WIDTH) / width); width = MAX_WIDTH; }
              canvas.width = width; canvas.height = height; canvas.getContext('2d').drawImage(img, 0, 0, width, height);
              
              const compressedBase64 = canvas.toDataURL('image/jpeg', 0.6);
              App.data.invoices.push({ id: generateId(), title: file.name, date: getToday(), imageBase64: compressedBase64 });
              App.saveData();
              App.showNotification("Document stored successfully.", "success");
            }; img.src = event.target.result;
          }; reader.readAsDataURL(file); e.target.value = null;
        },
        deleteInvoice: (id) => {
          App.data.invoices = App.data.invoices.filter(i => i.id !== id);
          App.saveData();
        }
      }
    };

    // Initialize the App
    window.onload = () => {
      App.init();
    };
  </script>
</body>
</html>
