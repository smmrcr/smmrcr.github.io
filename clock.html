<!DOCTYPE html>
<html>
<head>
<title>sm</title>
<link rel="stylesheet" type="text/css" href="cute.css">
<!-- <link rel="stylesheet" type="text/css" href="style.css"> -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  /* Local styles to support the clock while respecting cute.css */
  .clock-wrapper {
    margin: 4em auto; /* Centers the block horizontally on the page */
    max-width: 600px;
    display: flex;
    flex-direction: column;
    align-items: center; /* Centers the internal content */
    text-align: center;
  }
  .main-clock-face {
    width: 250px; /* Slightly larger base size */
    height: 250px;
    border: 1px solid currentColor;
    border-radius: 50%;
    position: relative;
    margin: 30px 0;
  }
  @media (min-width: 768px) {
    .main-clock-face {
      width: 380px; /* Expands on larger screens */
      height: 380px;
    }
  }
  .hand {
    position: absolute;
    left: 50%;
    bottom: 50%;
    transform-origin: bottom;
    background: currentColor;
    transform: translateX(-50%);
  }
  .mini-clock {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 1px solid currentColor;
    border-radius: 50%;
    position: relative;
    vertical-align: middle;
    margin-left: 10px;
    cursor: pointer;
  }
  .mini-hand {
    position: absolute;
    left: 50%;
    bottom: 50%;
    transform-origin: bottom;
    background: currentColor;
    transform: translateX(-50%);
  }
  .controls button {
    background: none;
    border: 1px solid currentColor;
    color: inherit;
    font-family: inherit;
    padding: 2px 8px;
    cursor: pointer;
    margin-right: 5px;
    font-size: 0.8em;
  }
  .controls button:hover {
    background: currentColor;
    color: #fff; /* Basic inversion for the 'cute' aesthetic */
  }
  .stats {
    font-size: 0.7em;
    margin-top: 10px;
    opacity: 0.7;
    line-height: 1.4;
  }
  .settings-panel {
    border: 1px dashed currentColor;
    padding: 10px;
    margin-top: 15px;
    font-size: 0.8em;
  }
  .hidden { display: none; }
  .blink { animation: blinker 1s linear infinite; }
  @keyframes blinker { 50% { opacity: 0; } }
</style>
</head>
<body>
  <!-- Navigation -->
<div id="nav-placeholder"></div>
<script src="nav.js"></script>

<!-- Body -->
<div class="clock-wrapper">
  <strong>Arrhythmic Clock</strong>
  <p id="status-line" class="stats">ENGINE: <span id="run-status" class="blink">STOPPED</span></p>

  <div class="main-clock-face" id="clock-trigger">
    <div class="hand" id="h-h" style="height: 25%; width: 2px;"></div>
    <div class="hand" id="h-m" style="height: 35%; width: 1.5px;"></div>
    <div class="hand" id="h-s" style="height: 42%; width: 0.5px;"></div>
    <!-- Ghost hand for real time reference -->
    <div class="hand hidden" id="h-g" style="height: 42%; width: 0.5px; opacity: 0.2; border-left: 1px dashed currentColor; background: none;"></div>
  </div>

  <div class="controls">
    <button id="btn-toggle">Start</button>
    <button id="btn-reset">Reset</button>
    <button id="btn-settings">Settings</button>
  </div>

  <div id="panel-settings" class="settings-panel hidden">
    <div>
      Mode: 
      <select id="select-mode" style="font-size: 10px;">
        <option value="clock">Clock (Real Time Sync)</option>
        <option value="timer">Timer (Relative)</option>
      </select>
    </div>
    <div style="margin-top:5px">
      Period: 
      <select id="select-period" style="font-size: 10px;">
        <option value="minute">Minute</option>
        <option value="hour">Hour</option>
        <option value="day">Day</option>
      </select>
    </div>
    <div style="margin-top:5px">
      Chaos: <input type="range" id="input-chaos" min="0" max="1" step="0.1" value="0.4" style="width: 50px; vertical-align: middle;">
    </div>
    <div style="margin-top:5px">
      <input type="checkbox" id="check-ghost"> Show Real Time
    </div>
  </div>

  <div class="stats">
    SUBJECTIVE TIME: <span id="txt-time">00:00:00</span><br>
    OFFSET: <span id="txt-offset">0</span>ms<br>
    SPEED: <span id="txt-speed">1.00</span>x
  </div>
</div>

<script>
  // Clock Logic
  let isPaused = true;
  let isTimerMode = false;
  let durationMode = 'minute';
  let chaosLevel = 0.4;
  let showGhost = false;

  let velocity = 1;
  let internalTime = Date.now();
  let lastFrame = performance.now();
  let offset = 0;

  const DURATIONS = { minute: 60000, hour: 3600000, day: 86400000 };

  const els = {
    hH: document.getElementById('h-h'), hM: document.getElementById('h-m'), hS: document.getElementById('h-s'), hG: document.getElementById('h-g'),
    mH: document.getElementById('m-h'), mM: document.getElementById('m-m'), mS: document.getElementById('m-s'),
    btnT: document.getElementById('btn-toggle'), btnR: document.getElementById('btn-reset'), btnS: document.getElementById('btn-settings'),
    mini: document.getElementById('mini-clock'), status: document.getElementById('run-status'), panel: document.getElementById('panel-settings'),
    txtT: document.getElementById('txt-time'), txtO: document.getElementById('txt-offset'), txtV: document.getElementById('txt-speed')
  };

  function getProgress(ts) {
    const d = new Date(ts);
    if (isTimerMode) {
      const start = new Date(ts).setHours(0,0,0,0);
      return Math.min((ts - start) / DURATIONS[durationMode], 1);
    }
    const s = d.getSeconds() + d.getMilliseconds() / 1000;
    const m = d.getMinutes() + s / 60;
    const h = d.getHours() + m / 60;
    return durationMode === 'minute' ? s/60 : durationMode === 'hour' ? m/60 : h/24;
  }

  function updateHands(ts, h, m, s) {
    const d = new Date(ts);
    const sec = d.getSeconds() + d.getMilliseconds() / 1000;
    const min = d.getMinutes() + sec / 60;
    const hr = (d.getHours() % 12) + min / 60;
    h.style.transform = `translateX(-50%) rotate(${hr * 30}deg)`;
    m.style.transform = `translateX(-50%) rotate(${min * 6}deg)`;
    s.style.transform = `translateX(-50%) rotate(${sec * 6}deg)`;
  }

  function loop(now) {
    const dt = (now - lastFrame) / 1000;
    lastFrame = now;

    if (!isPaused) {
      const p = getProgress(internalTime);
      const targetV = 1.6 - (p * 1.2);
      
      if (Math.random() < chaosLevel * 0.08) {
        velocity += (Math.random() - 0.5) * chaosLevel * 4;
      } else {
        velocity += (targetV - velocity) * 0.05;
      }
      
      velocity = Math.max(0.1, Math.min(velocity, 4));
      internalTime += dt * 1000 * velocity;
      if (!isTimerMode) offset = (internalTime - Date.now()) / 1000;
    }

    updateHands(internalTime, els.hH, els.hM, els.hS);
    updateHands(internalTime, els.mH, els.mM, els.mS);
    
    if (showGhost) {
      els.hG.classList.remove('hidden');
      const gs = new Date().getSeconds() + new Date().getMilliseconds() / 1000;
      els.hG.style.transform = `translateX(-50%) rotate(${gs * 6}deg)`;
    } else {
      els.hG.classList.add('hidden');
    }

    els.txtT.innerText = new Date(internalTime).toLocaleTimeString([], {hour12:false, hour:'2-digit', minute:'2-digit', second:'2-digit'});
    els.txtO.innerText = Math.round(offset * 1000);
    els.txtV.innerText = velocity.toFixed(2);

    requestAnimationFrame(loop);
  }

  const toggle = () => {
    isPaused = !isPaused;
    els.btnT.innerText = isPaused ? 'Start' : 'Stop';
    els.status.innerText = isPaused ? 'STOPPED' : 'RUNNING';
    els.status.className = isPaused ? 'blink' : '';
  };

  els.btnT.onclick = els.mini.onclick = toggle;
  els.btnR.onclick = () => {
    const d = new Date();
    if (isTimerMode) d.setHours(0,0,0,0);
    internalTime = d.getTime();
    velocity = 1; offset = 0;
  };
  els.btnS.onclick = () => els.panel.classList.toggle('hidden');
  
  document.getElementById('select-mode').onchange = (e) => {
    isTimerMode = e.target.value === 'timer';
    els.btnR.onclick();
  };
  document.getElementById('select-period').onchange = (e) => durationMode = e.target.value;
  document.getElementById('input-chaos').oninput = (e) => chaosLevel = parseFloat(e.target.value);
  document.getElementById('check-ghost').onchange = (e) => showGhost = e.target.checked;

  requestAnimationFrame(loop);
</script>
</body>
</html>
